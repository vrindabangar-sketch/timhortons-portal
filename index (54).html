<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F5F0;--card:#FFF;--ink:#0A0A0A;--ink2:#4A4A4A;--ink3:#7A7A7A;--line:#E8E8E4;--red:#C8102E;--red2:#9A0B22;--green:#1B7A3D;--shadow:0 1px 3px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.04)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;width:100%}
input:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1)}
.hide{display:none!important}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--ink);color:#ccc;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.3s}
.sb-brand{padding:20px 18px;border-bottom:1px solid #222}
.sb-logo{font-weight:900;font-size:17px;color:#fff}.sb-logo span{color:var(--red)}
.sb-tag{font-size:10px;color:#888;margin-top:2px}
.sb-nav{flex:1;padding:10px 0}
.sb-link{display:flex;align-items:center;gap:10px;padding:11px 18px;color:#ccc;font-weight:600;font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:.15s}
.sb-link:hover{background:#1a1a1a;color:#fff}
.sb-link.on{background:linear-gradient(90deg,rgba(200,16,46,.15),transparent);color:#fff;border-left-color:var(--red)}
.main{flex:1;margin-left:220px;min-width:0}
.topbar{background:#fff;border-bottom:2px solid var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:17px;font-weight:800}
.menu-btn{display:none;background:var(--ink);color:#fff;padding:6px 10px;border-radius:6px;font-size:16px}
.content{padding:24px}
.store-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.store-bar label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase}
.store-bar select{width:auto;min-width:200px;font-weight:600}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:.2s}
.kpi:hover{transform:translateY(-2px);border-color:var(--red)}
.kpi-lbl{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;letter-spacing:-.02em}
.kpi-sub{font-size:10px;color:var(--ink3);font-weight:600;margin-top:4px}
.tf-card{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:16px;border-left:4px solid var(--red);border-radius:12px;cursor:pointer;margin-bottom:20px;box-shadow:var(--shadow);transition:.2s}
.tf-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,16,46,.12)}
.tt-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px;transition:.2s}
.tt-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08)}
.tt-h{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.tt-name{font-size:16px;font-weight:800}
.tt-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px}
.tt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tt-box{border-radius:10px;padding:12px;font-size:12px;border:1.5px solid var(--line);min-height:120px;display:flex;flex-direction:column;gap:4px}
.tt-box.done{background:#F0FDF4;border-color:#22C55E}
.tt-box.pending{background:#FAFAFA;border-color:#DDD}
.quiz-btn{width:100%;padding:7px;border-radius:7px;background:var(--red);color:#fff;font-weight:700;font-size:11px;margin-top:auto;cursor:pointer}
.staff-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.badge-g{background:#DCFCE7;color:#166534}.badge-b{background:#DBEAFE;color:#1E40AF}.badge-y{background:#FEF3C7;color:#92400E}
.roster-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qz-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.qz-md{background:#fff;border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;border-top:4px solid var(--red)}
.qz-md h2{font-size:18px;font-weight:800;margin-bottom:2px}
.qz-q{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.qz-q .qt{font-size:13px;font-weight:700;margin-bottom:8px}
.qz-q .qn{color:var(--red);font-weight:800;margin-right:4px}
.qz-q label{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.qz-q label:hover{background:#fff}
.qz-q input[type=radio]{accent-color:var(--red)}
.qz-submit{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px}
.qz-cancel{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--line);border-radius:10px;font-size:12px;cursor:pointer;margin-top:6px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:9999;opacity:0;transform:translateY(20px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
.empty{padding:30px;text-align:center;color:var(--ink3);background:var(--bg);border:1px dashed var(--line);border-radius:10px}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-btn{display:inline-flex}.kpi-grid{grid-template-columns:repeat(2,1fr)}.tt-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kpi-grid,.tt-grid{grid-template-columns:1fr}}
</style>
</head>

// === SHA-256 PASSWORD HASHING ===
async function sha256(msg){
  var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}

function getPwKey(email){return "user_"+email.toLowerCase().trim()}
function getStoredHash(email){return localStorage.getItem(getPwKey(email))}
function setStoredHash(email,hash){localStorage.setItem(getPwKey(email),hash)}
function hasPassword(email){return !!getStoredHash(email)}

// Forgot Password UI
function showForgotPw(){
  var loginCard=$("loginPage").querySelector("div[style*='border-top']");
  if(loginCard)loginCard.style.display="none";
  $("fpModal").style.display="block";
  $("fpErr").style.display="none";$("fpOk").style.display="none";
}
function hideForgotPw(){
  $("fpModal").style.display="none";
  var loginCard=$("loginPage").querySelector("div[style*='border-top']");
  if(loginCard)loginCard.style.display="block";
}

async function doForgotPw(){
  var email=$("fpEmail").value.trim().toLowerCase();
  var code=$("fpCode").value.trim();
  var newPw=$("fpNew").value;
  var confirm=$("fpConfirm").value;
  var err=$("fpErr");var ok=$("fpOk");
  err.style.display="none";ok.style.display="none";
  if(!email){err.textContent="Email is required";err.style.display="block";return}
  if(code!=="TH2026"){err.textContent="Invalid authentication code";err.style.display="block";return}
  if(!newPw||newPw.length<6){err.textContent="Password must be 6+ characters";err.style.display="block";return}
  if(newPw!==confirm){err.textContent="Passwords do not match";err.style.display="block";return}
  var hash=await sha256(newPw);
  setStoredHash(email,hash);
  ok.textContent="✓ Password set successfully. You can now login.";ok.style.display="block";
  setTimeout(function(){hideForgotPw();$("lEmail").value=email},2000);
}

// Change Password (from dashboard)
function showChangePw(){
  var ov=document.createElement("div");ov.className="qz-ov";ov.id="cpwOverlay";
  ov.innerHTML="<div class=\"qz-md\"><h2>🔑 Change Password</h2><div style=\"font-size:11px;color:var(--ink3);margin-bottom:16px\">Enter authentication code + new password</div><div id=\"cpErr\" style=\"background:#FEE2E2;color:#991B1B;padding:10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px;display:none\"></div><div id=\"cpOk\" style=\"background:#DCFCE7;color:#166534;padding:10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px;display:none\"></div><div style=\"margin-bottom:10px\"><label style=\"font-size:11px;font-weight:700\">Authentication Code</label><input type=\"password\" id=\"cpCode\" style=\"margin-top:4px\" placeholder=\"Enter code\"></div><div style=\"margin-bottom:10px\"><label style=\"font-size:11px;font-weight:700\">New Password</label><input type=\"password\" id=\"cpNew\" style=\"margin-top:4px\"></div><div style=\"margin-bottom:14px\"><label style=\"font-size:11px;font-weight:700\">Confirm Password</label><input type=\"password\" id=\"cpConfirm\" style=\"margin-top:4px\"></div><button class=\"qz-submit\" onclick=\"doChangePw()\">Update Password</button><button class=\"qz-cancel\" onclick=\"document.getElementById('cpwOverlay').remove()\">Cancel</button></div>";
  document.body.appendChild(ov);
}

async function doChangePw(){
  var code=$("cpCode").value.trim();
  var newPw=$("cpNew").value;
  var confirm=$("cpConfirm").value;
  var err=$("cpErr");var ok=$("cpOk");
  err.style.display="none";ok.style.display="none";
  if(code!=="TH2026"){err.textContent="Invalid authentication code";err.style.display="block";return}
  if(!newPw||newPw.length<6){err.textContent="Password must be 6+ characters";err.style.display="block";return}
  if(newPw!==confirm){err.textContent="Passwords do not match";err.style.display="block";return}
  var hash=await sha256(newPw);
  setStoredHash(SESSION.email,hash);
  ok.textContent="✓ Password changed successfully";ok.style.display="block";
  setTimeout(function(){$("cpwOverlay").remove()},1500);
}

async function doLogin(){
  var email=$("lEmail").value.trim().toLowerCase();
  var pass=$("lPass").value;
  var err=$("loginErr");err.style.display="none";
  if(!email||!pass){err.textContent="Enter email and password";err.style.display="block";return}

  // First time check
  if(!hasPassword(email)){
    err.innerHTML="First time login? Please use <a onclick=\"showForgotPw()\" style=\"color:#C8102E;font-weight:800;cursor:pointer;text-decoration:underline\">Forgot Password</a> to set your password.";
    err.style.display="block";return;
  }

  // Hash and compare
  var hash=await sha256(pass);
  var stored=getStoredHash(email);
  if(hash!==stored){err.textContent="Invalid password";err.style.display="block";return}

  // Success — set session
  var u=ROLES[email];
  if(u){SESSION={email:email,name:u.name,role:u.role,stores:u.stores}}
  else{SESSION={email:email,name:email.split("@")[0],role:"store",stores:null}}
  $("loginPage").style.display="none";
  $("appShell").classList.remove("hide");
  if(SESSION.role==="am"){var tag=document.querySelector(".sb-tag");if(tag)tag.textContent="Area Manager · "+SESSION.name}
  go("dash");
}
function doLogout(){SESSION=null;$("appShell").classList.add("hide");$("loginPage").style.display="flex";$("lEmail").value="";$("lPass").value=""}

  return a;
}
function scopedAll(){
  if(SESSION&&SESSION.stores)return DB.employees.filter(function(e){return SESSION.stores.indexOf(e.store)>-1});
  return DB.employees;
}

};
return(Q[st]||Q.HOT).map(function(q){return{question:q[0],answer:q[1],options:shuffle([q[1],q[2],q[3],q[4]])}});
}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function stationDone(t,s){return t&&t[s]!==null&&t[s]!==undefined&&t[s].marks===20}
function completedCount(e){if(!e.training)return 0;return STATIONS.filter(function(s){return stationDone(e.training,s)}).length}
function trainPct(e){return Math.round((completedCount(e)/6)*100)}
function fullName(e){return(e.firstName||"")+" "+(e.lastName||"")}
function filtered(){var a=scopedActive();if(selectedStore==="all")return a;return a.filter(function(e){return e.store===selectedStore})}
function allFiltered(){var base=scopedAll();if(selectedStore==="all")return base;return base.filter(function(e){return e.store===selectedStore})}

function storeBar(){
  var visibleStores=SESSION&&SESSION.stores?ALL_STORES.filter(function(s){return SESSION.stores.indexOf(s)>-1}):ALL_STORES;
  var opts=visibleStores.map(function(s){return "<option value=\""+esc(s)+"\""+(selectedStore===s?" selected":"")+">"+esc(s)+"</option>"}).join("");
  return "<div class=\"store-bar\"><label>🏪 Store Filter:</label><select id=\"storeSelect\" onchange=\"selectedStore=this.value;go(document.querySelector('.sb-link.on').dataset.v)\"><option value=\"all\">All Stores ("+scopedAll().length+")</option>"+opts+"</select></div>";
}

function go(v){
  document.querySelectorAll(".sb-link").forEach(function(l){l.classList.toggle("on",l.dataset.v===v)});
  $("pageTitle").textContent={dash:"Dashboard",staff:"Staff Data",train:"Training Tracker",roster:"Weekly Roster"}[v];
  if(innerWidth<900)$("sidebar").classList.remove("open");
  ({dash:renderDash,staff:renderStaff,train:renderTrain,roster:renderRoster})[v]();
}

function kpi(l,v,s){return "<div class=\"kpi\"><div class=\"kpi-lbl\">"+l+"</div><div class=\"kpi-val\">"+v+"</div><div class=\"kpi-sub\">"+s+"</div></div>"}

function renderDash(){
  var emps=filtered();var all=allFiltered();var total=emps.length;
  var ft=emps.filter(function(e){return completedCount(e)===6}).length;
  var fostac=emps.filter(function(e){return e.fostac}).length;
  var ist=emps.filter(function(e){return e.ist}).length;
  var notice=all.filter(function(e){return e.status==="Notice Period"}).length;
  var avg=total?Math.round(emps.reduce(function(s,e){return s+trainPct(e)},0)/total):0;
  $("content").innerHTML=storeBar()+
    "<div class=\"tf-card\" onclick=\"window.open(TF_LINK,'_blank')\"><div><div style=\"font-weight:800;font-size:14px\">📂 Training Access</div><div style=\"font-size:11px;color:var(--ink3);margin-top:2px\">SOPs &amp; training documents</div></div><div style=\"color:var(--red);font-weight:800;font-size:13px\">Open Here →</div></div>"+
    "<div class=\"kpi-grid\">"+kpi("Total Staff",total,"active")+kpi("Training %",avg+"%","avg")+kpi("Fully Trained",ft,"6/6")+kpi("FOSTAC",fostac,"certified")+kpi("IST",ist,"trainers")+kpi("On Notice",notice,"exit")+kpi("Required",14,"target")+kpi("Gap",Math.max(0,14-total),total>=14?"ok":"need "+(14-total))+"</div>";
}

function renderStaff(){
  var emps=allFiltered();
  var h=storeBar()+"<div style=\"margin-bottom:14px\"><b>"+emps.length+" Employees</b></div><div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px\">";
  emps.forEach(function(e){var p=trainPct(e);var d=daysSince(e.doj);var c=completedCount(e);
    var b="";if(e.ist)b+="<span class=\"badge badge-b\">IST</span> ";if(e.fostac)b+="<span class=\"badge badge-g\">FOSTAC</span> ";if(e.nextLeader)b+="<span class=\"badge badge-y\">★ Next Leader</span> ";
    h+="<div class=\"staff-card\"><div style=\"font-weight:800;font-size:14px\">"+esc(fullName(e))+"</div><div style=\"font-size:11px;color:var(--ink3);margin:4px 0\">"+esc(e.desig)+" · "+esc(e.store)+" · "+d+" days</div><div style=\"font-size:11px;color:"+(p===100?"var(--green)":"var(--red)")+";font-weight:700\">Training: "+p+"% ("+c+"/6)</div>"+(b?"<div style=\"display:flex;gap:4px;flex-wrap:wrap;margin-top:6px\">"+b+"</div>":"")+"</div>";
  });
  h+="</div>";$("content").innerHTML=h;
}

function renderTrain(){
  var emps=filtered();var h=storeBar();
  emps.forEach(function(e){var c=completedCount(e);var p=trainPct(e);
    h+="<div class=\"tt-card\"><div class=\"tt-h\"><div><div class=\"tt-name\">"+esc(fullName(e))+"</div><div class=\"tt-meta\">"+esc(e.desig)+" · "+esc(e.store)+" · "+daysSince(e.doj)+" days</div></div><div style=\"text-align:right\"><div style=\"font-size:24px;font-weight:900;color:"+(p===100?"var(--green)":"var(--red)")+"\">"+p+"%</div><div style=\"font-size:10px;color:var(--ink3)\">"+c+"/6</div></div></div><div class=\"tt-grid\">";
    STATIONS.forEach(function(s){var done=stationDone(e.training,s);var d=e.training?e.training[s]:null;
      if(done){h+="<div class=\"tt-box done\"><div class=\"tt-box-h\"><span>"+ST_ICO[s]+"</span> "+s+"</div><div style=\"font-weight:700;color:var(--green)\">✔ Completed</div><div style=\"font-size:11px\">Marks: 20/20</div><div style=\"font-size:10px;color:var(--ink3)\">📅 "+esc(d.date)+"</div></div>"}
      else{h+="<div class=\"tt-box pending\"><div class=\"tt-box-h\"><span>"+ST_ICO[s]+"</span> "+s+"</div><div style=\"font-weight:700;color:var(--ink3)\">❌ Pending</div><button class=\"quiz-btn\" onclick=\"openQuiz("+e.id+",'"+ s+"')\">Take Quiz</button></div>"}
    });
    h+="</div></div>";
  });
  if(!emps.length)h+=storeBar()+"<div class=\"empty\">No active employees</div>";
  $("content").innerHTML=h;
}

function openQuiz(id,st){
  var e=DB.employees.find(function(x){return x.id===id});if(!e)return;
  if(stationDone(e.training,st)){toast("Already completed!","ok");return}
  var qs=DB.questions[st];if(!qs||!qs.length){toast("No questions","err");return}
  var ov=document.createElement("div");ov.className="qz-ov";
  var inner="<div class=\"qz-md\"><h2>"+ST_ICO[st]+" "+st+" Station Quiz</h2><div style=\"font-size:11px;color:var(--ink3);margin-bottom:16px\">20 MCQs · 100% required · Answers not shown</div>";
  qs.forEach(function(q,i){
    inner+="<div class=\"qz-q\"><div class=\"qt\"><span class=\"qn\">Q"+(i+1)+".</span>"+esc(q.question)+"</div>";
    q.options.forEach(function(o){inner+="<label><input type=\"radio\" name=\"qq"+i+"\" value=\""+esc(o)+"\">"+esc(o)+"</label>"});
    inner+="</div>";
  });
  inner+="<button class=\"qz-submit\" onclick=\"submitQ("+id+",'"+st+"')\">Submit Quiz</button><button class=\"qz-cancel\" onclick=\"this.closest('.qz-ov').remove()\">Cancel</button></div>";
  ov.innerHTML=inner;document.body.appendChild(ov);
}

function submitQ(id,st){
  var e=DB.employees.find(function(x){return x.id===id});if(!e)return;
  if(stationDone(e.training,st)){toast("Already completed!","ok");document.querySelector(".qz-ov").remove();return}
  var qs=DB.questions[st];var ans=0;var cor=0;
  qs.forEach(function(q,i){var s=document.querySelector("input[name=\"qq"+i+"\"]:checked");if(s){ans++;if(s.value===q.answer)cor++}});
  if(ans<qs.length){toast("Answer all "+qs.length+" questions","err");return}
  if(cor===qs.length){e.training[st]={marks:20,date:todayStr()};saveDB();document.querySelector(".qz-ov").remove();toast("✅ PASSED!","ok")}
  else{toast("❌ "+cor+"/"+qs.length+" — Must score 100%","err")}
  renderTrain();
}

function renderRoster(){
  var rosters=selectedStore==="all"?DB.rosters:DB.rosters.filter(function(r){return r.store===selectedStore});
  var h=storeBar()+"<div style=\"margin-bottom:14px\"><input type=\"file\" id=\"rIn\" accept=\"application/pdf,image/*\" style=\"display:none\" onchange=\"upRoster(event)\"><button onclick=\"$('rIn').click()\" style=\"padding:8px 16px;background:var(--red);color:#fff;border-radius:8px;font-weight:700;font-size:12px\">📤 Upload Roster</button></div>";
  if(!rosters.length)h+="<div class=\"empty\">No rosters uploaded</div>";
  else rosters.slice().reverse().forEach(function(r){
    h+="<div class=\"roster-card\"><div><div style=\"font-size:12px;font-weight:600\">"+(r.type.indexOf("pdf")>-1?"📄":"🖼️")+" "+esc(r.name)+"</div><div style=\"font-size:10px;color:var(--ink3)\">📅 "+esc(r.date)+" · 🏪 "+esc(r.store||"")+"</div></div><button onclick=\"window.open('"+r.data+"','_blank')\" style=\"padding:6px 14px;background:var(--red);color:#fff;border-radius:6px;font-size:11px;font-weight:700\">View</button></div>";
  });
  $("content").innerHTML=h;
}
function upRoster(ev){
  var f=ev.target.files[0];if(!f)return;if(f.size>5*1024*1024){toast("Max 5MB","err");return}
  var store=selectedStore==="all"?"General":selectedStore;
  var r=new FileReader();r.onload=function(e){DB.rosters.push({name:f.name,type:f.type,date:todayStr(),store:store,data:e.target.result});saveDB();toast("✓ Uploaded","ok");renderRoster()};r.readAsDataURL(f);ev.target.value="";
}

$("dateNow").textContent=new Date().toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
loadDB();
// Login first — renderDash called after login

</script>
