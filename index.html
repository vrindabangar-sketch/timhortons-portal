*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F5F7;--card:#FFF;--ink:#0B0B0F;--ink2:#475569;--ink3:#64748B;--line:#E5E9F0;--red:#C8102E;--red-d:#9A0B22;--green:#16A34A;--gold:#D4960A;--shadow:0 1px 3px rgba(15,23,42,.08),0 4px 12px rgba(15,23,42,.06);--shadow-lg:0 12px 32px rgba(15,23,42,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hide{display:none!important}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font:inherit;width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-weight:600;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;transition:.15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;box-shadow:0 4px 12px rgba(200,16,46,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(200,16,46,.4)}
.btn-ghost{background:#F1F5F9;color:var(--ink2);border:1px solid var(--line)}
.btn-ghost:hover{background:#E2E8F0}
.btn-sm{padding:7px 13px;font-size:12px}
.bdg{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.02em}
.bdg-g{background:#DCFCE7;color:#166534}.bdg-r{background:#FEE2E2;color:#991B1B}.bdg-y{background:#FEF3C7;color:#92400E}.bdg-b{background:#DBEAFE;color:#1E40AF}.bdg-grey{background:#F1F5F9;color:#64748B}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0B0B0F 0%,#1A1A21 100%)}
.login-card{background:#fff;border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.4);padding:36px 30px;width:100%;max-width:400px;border-top:5px solid var(--red)}
.login-card h1{font-size:22px;color:var(--ink);margin-bottom:4px;letter-spacing:-.02em}
.login-card .sub{color:var(--ink3);font-size:12px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.err{background:#FEE2E2;color:#991B1B;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px}

/* APP SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#0B0B0F,#1A1A21);color:#E4E4E7;display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 16px rgba(0,0,0,.15);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:.3s}
.sb-h{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-weight:900;font-size:18px;color:#fff;letter-spacing:-.02em}
.sb-logo span{color:var(--red)}
.sb-tag{font-size:10px;color:#9CA3AF;font-weight:600;margin-top:2px}
.sb-user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-name{font-weight:800;color:#fff;font-size:13px}
.sb-role{font-size:11px;color:var(--red);font-weight:700;margin-top:2px}
.sb-scope{font-size:10px;color:#9CA3AF;margin-top:2px}
.sb-nav{flex:1;padding:12px 0}
.sb-link{display:flex;align-items:center;gap:11px;padding:11px 16px;margin:2px 10px;border-radius:10px;color:#E4E4E7;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.sb-link:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-link.active{background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff;box-shadow:0 6px 18px rgba(200,16,46,.45)}
.sb-link i{font-size:16px;width:18px;text-align:center}

.main{flex:1;min-width:0;margin-left:230px;width:calc(100% - 230px)}
.topbar{background:#fff;border-bottom:2px solid var(--ink);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.topbar h2{font-size:18px;font-weight:800;color:var(--ink)}
.topbar .right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink3);font-weight:600}
.menu-btn{display:none;background:var(--ink);color:#fff;padding:8px 12px;border-radius:8px;font-size:18px}

.content{padding:24px 28px;width:100%;min-height:calc(100vh - 60px)}
.page-h{margin-bottom:22px}
.page-h h1{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.page-h p{color:var(--ink3);font-size:13px;margin-top:4px}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px;width:100%}
.card-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.card-t{font-size:15px;font-weight:800;color:var(--ink)}
.card-st{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px}

/* KPI GRID — explicit columns */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;margin-bottom:18px}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:.2s;min-width:0}
.kpi:hover{transform:translateY(-2px);border-color:var(--red);box-shadow:0 8px 20px rgba(200,16,46,.12)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.kpi-lbl{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.kpi-ico{font-size:18px;opacity:.7}
.kpi-val{font-size:26px;font-weight:900;color:var(--ink);line-height:1;letter-spacing:-.02em}
.kpi-sub{font-size:10.5px;color:var(--ink3);font-weight:600;margin-top:6px}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;width:100%}
.row-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;width:100%}
@media(max-width:900px){.row-2,.row-3{grid-template-columns:1fr}}

.bar{height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red-d));border-radius:4px;transition:width .4s}

table{width:100%;border-collapse:collapse}
.tbl-wrap{border:1px solid var(--line);border-radius:10px;overflow:auto}
table thead th{background:var(--ink);color:#fff;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:11px 13px;text-align:left}
table tbody tr{border-bottom:1px solid #F1F5F9;transition:background .15s}
table tbody tr:nth-child(even){background:#FAFBFC}
table tbody tr:hover{background:#FFF1F2;cursor:pointer}
table tbody td{padding:11px 13px;font-size:12px;color:#334155}

.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);z-index:9999;opacity:0;transform:translateY(20px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}

/* MODAL */
.mover{position:fixed;inset:0;background:rgba(11,11,15,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000;backdrop-filter:blur(4px)}
.mover.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;border-top:5px solid var(--red);box-shadow:0 24px 64px rgba(0,0,0,.4)}
.modal h3{font-size:18px;margin-bottom:6px}
.modal .sub{color:var(--ink3);font-size:12px;margin-bottom:18px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.fg2{grid-template-columns:1fr}}

@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;width:100%}.menu-btn{display:inline-flex}.content{padding:16px}.topbar{padding:12px 16px}}
.empty{padding:40px 20px;text-align:center;color:var(--ink3);background:#FAFBFC;border:1px dashed var(--line);border-radius:12px}
</style></head>
<body>

<div class="login-wrap" id="loginPage">

</div>

<!-- APP -->
<div class="shell hide" id="appShell">

    <div class="content" id="content"></div>

</div>
<div class="toast" id="toast"></div>
<div class="mover" id="modal"><div class="modal" id="modalBody"></div></div>

function defaultPw(){return 'tim2026'}

function doLogin(){
  const email=$('lEmail').value.trim().toLowerCase(),pass=$('lPass').value;
  const err=$('loginErr');err.classList.add('hide');
  if(!email||!pass){err.textContent='Enter email and password';err.classList.remove('hide');return}
  if(pass!==pwFor(email)){err.textContent='Invalid email or password';err.classList.remove('hide');return}
  let s=null;
  if(TRAINERS[email]){s={role:'trainer',email,name:TRAINERS[email].name}} else if(CEOS[email]){s={role:'ceo',email,name:CEOS[email].name}} else if(ADMINS[email]){s={role:'admin',email,name:ADMINS[email].name}}
  else{const ak=Object.keys(AREA_MGRS).find(k=>AREA_MGRS[k].email.toLowerCase()===email);if(ak){s={role:'am',email,name:AREA_MGRS[ak].name,amKey:ak}}else{const st=STORE_BY_EMAIL[email];if(st)s={role:'store',email,name:st.n+' Manager',store:st.n,amKey:st.am}}}
  if(!s){err.textContent='Email not recognized';err.classList.remove('hide');return}
  SESSION=s;sessionStorage.setItem('th_sess',JSON.stringify(s));enterApp();
}

function doCpw(){
  const email=$('cpEmail').value.trim().toLowerCase();
  const code=$('cpCode').value.trim();
  const newPw=$('cpNew').value;
  const confirmPw=$('cpConfirm').value;
  const er=$('cpwErr'), ok=$('cpwOk');
  er.classList.add('hide'); ok.classList.add('hide');
  const showErr=(msg)=>{er.textContent=msg;er.classList.remove('hide')};
  if(!email){return showErr('Please enter your username / email')}
  if(!code){return showErr('Please enter the authentication code')}
  // Rule 1: authentication code must be TH2026
  if(code!=='TH2026'){return showErr('Invalid authentication code')}
  if(!newPw||newPw.length<6){return showErr('New password must be at least 6 characters')}
  // Rule 2: new password + confirm password must match
  if(newPw!==confirmPw){return showErr('Passwords do not match')}
  // Rule 3: all valid → update + show success
  DB.passwords[email]=newPw;
  saveDB();
  ok.textContent='✓ Password changed successfully';
  ok.classList.remove('hide');
  // Clear fields
  $('cpEmail').value='';$('cpCode').value='';$('cpNew').value='';$('cpConfirm').value='';
  // Auto-return to login after 1.5s
  setTimeout(()=>{showLogin();$('lEmail').value=email},1500);
}

function metrics(emps,stores){
  const active=emps.filter(e=>e.status==='Active');
  const left=emps.filter(e=>e.status==='Left');
  const notice=emps.filter(e=>e.status==='Notice Period'||e.onNotice);
  const newJ=active.filter(isNewJoiner);
  const ist=active.filter(e=>e.ist).length;
  const fostac=active.filter(e=>e.fostac).length;
  const trained=active.filter(isFullyTrained).length;
  const nl=active.filter(e=>e.nextLeader).length;
  const sumPct=active.reduce((s,e)=>s+trainPct(e),0);
  const trainAvg=active.length?Math.round(sumPct/active.length):0;
  const pending=active.filter(e=>!isFullyTrained(e)).length;
  const required=stores.reduce((s,st)=>s+reqStaffFor(st.n),0);
  const lt90=active.filter(e=>daysSince(e.doj)<90).length;
  const lt365=active.filter(e=>daysSince(e.doj)<365).length;
  const recentLeft=left.filter(e=>e.exitDate&&daysSince(e.exitDate)<=90).length;
  const attr=active.length?Math.round((recentLeft/(active.length+recentLeft))*1000)/10:0;
  return{active:active.length,left:left.length,notice:notice.length,newJ:newJ.length,ist,fostac,trained,nl,trainAvg,pending,required,gap:Math.max(0,required-active.length),lt90,lt365,attr,recentLeft}
}

function fmtDateOnly(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}

function renderRosterSection(){
  if(!DB.rosters)DB.rosters=[];
  const isStore=SESSION.role==='store';
  const isView=!isStore;
  // Scope rosters by role
  let visible=[];
  if(SESSION.role==='store')visible=DB.rosters.filter(r=>r.store===SESSION.store);
  else if(SESSION.role==='am'){const ss=scopeStores().map(s=>s.n);visible=DB.rosters.filter(r=>ss.includes(r.store))}
  else visible=DB.rosters; // admin + trainer + ceo see all
  const title=isStore?'📅 Weekly Roster Upload':'📅 Store Rosters';
  const sub=isStore?`Upload PDF / image rosters · ${visible.length} file(s)`:`${SESSION.role==='am'?'Your area · ':'Pan-India · '}${visible.length} roster file(s)`;

  let html=`<div class="roster-section"><div class="roster-h"><div><h2>${title}</h2><div class="roster-st">${sub}</div></div>${isStore?`<div><input type="file" id="rosterFileInput" accept="application/pdf,image/jpeg,image/png" multiple style="display:none" onchange="uploadRosters(event)"><button class="roster-upload-btn" onclick="document.getElementById('rosterFileInput').click()">📤 Upload Roster</button></div>`:''}</div>`;

  if(isStore){
    // Store Manager: flat grid of own roster files
    if(!visible.length){html+='<div class="roster-empty">No roster files uploaded yet. Click <b>Upload Roster</b> to add PDFs or images.</div>';}
    else{html+='<div class="roster-grid">'+visible.slice().reverse().map(r=>rosterCard(r,true)).join('')+'</div>';}
  } else {
    // AM / Admin: group by store, latest first per store
    const stores=scopeStores();
    const byStore={};
    visible.forEach(r=>{if(!byStore[r.store])byStore[r.store]=[];byStore[r.store].push(r)});
    if(!stores.length||!Object.keys(byStore).length){html+='<div class="roster-empty">No rosters uploaded by any store yet.</div>';}
    else{
      html+=stores.filter(s=>byStore[s.n]).map(s=>{
        const files=byStore[s.n].slice().sort((a,b)=>b.uploadedAt.localeCompare(a.uploadedAt));
        const latest=files[0];
        return `<div class="store-roster-block"><div class="srb-h"><span>🏪 ${esc(s.n)}</span><span class="srb-count">${files.length} file(s) · latest ${fmtDateOnly(latest.uploadedAt)}</span></div><div class="roster-grid">${files.map(r=>rosterCard(r,false)).join('')}</div></div>`;
      }).join('');
      const noRoster=stores.filter(s=>!byStore[s.n]);
      if(noRoster.length){html+=`<div style="margin-top:14px;padding:12px;background:#0B0B0F;border:1px dashed #333;border-radius:10px;font-size:11px;color:#9CA3AF">⚠️ No roster yet from: ${noRoster.map(s=>esc(s.n)).join(', ')}</div>`;}
    }
  }
  html+='</div>';
  return html;
}

function rosterCard(r,canDelete){
  const isPdf=(r.type||'').includes('pdf');
  const ico=isPdf?'📄':'🖼️';
  const idx=DB.rosters.indexOf(r);
  return `<div class="roster-card"><div class="rc-top"><div class="rc-ico">${ico}</div><div class="rc-name">${esc(r.name)}</div></div><div class="rc-meta"><span>📅 ${fmtDateOnly(r.uploadedAt)}</span><span>${((r.size||0)/1024).toFixed(0)} KB</span></div><div class="rc-meta" style="font-size:9.5px"><span>🏪 ${esc(r.store)}</span></div><div class="rc-actions"><a href="${r.data}" target="_blank" rel="noopener" class="rc-btn rc-view">👁 View</a>${canDelete?`<button class="rc-btn rc-del" onclick="delRoster(${idx})">🗑</button>`:''}</div></div>`;
}

function uploadRosters(ev){
  const files=Array.from(ev.target.files||[]);if(!files.length)return;
  if(SESSION.role!=='store'){toast('Only Store Managers can upload','err');return}
  let processed=0,total=files.length;
  files.forEach(file=>{
    if(!['application/pdf','image/jpeg','image/png','image/jpg'].includes(file.type)){toast(`${file.name}: invalid type (PDF/JPG/PNG only)`,'err');processed++;if(processed===total)done();return}
    if(file.size>5*1024*1024){toast(`${file.name}: too large (max 5 MB)`,'err');processed++;if(processed===total)done();return}
    const reader=new FileReader();
    reader.onload=e=>{
      if(!DB.rosters)DB.rosters=[];
      DB.rosters.push({name:file.name,type:file.type,size:file.size,store:SESSION.store,uploadedAt:new Date().toISOString(),uploadedBy:SESSION.email,data:e.target.result});
      processed++;
      if(processed===total)done();
    };
    reader.readAsDataURL(file);
  });
  function done(){saveDB();logAct(`${total} roster file(s) uploaded for ${SESSION.store}`,SESSION.store);toast('✓ Uploaded '+total+' file(s)','ok');ev.target.value='';refreshCurrentView();}
}

function delRoster(idx){
  if(SESSION.role!=='store'&&SESSION.role!=='trainer'){toast('No permission','err');return}
  const r=DB.rosters[idx];if(!r)return;
  if(SESSION.role==='store'&&r.store!==SESSION.store){toast('Cannot delete other stores rosters','err');return}
  if(!confirm('Delete roster "'+r.name+'"?'))return;
  DB.rosters.splice(idx,1);saveDB();toast('✓ Deleted','ok');refreshCurrentView();
}

  if(active)switchView(active.dataset.v);
}

  let files=DB.trainingFiles||[];

  if(SESSION.role==='store'){files=files.filter(f=>f.store==='all'||f.store===SESSION.store)}
  else if(SESSION.role==='am'){const ss=scopeStores().map(s=>s.n);files=files.filter(f=>f.store==='all'||ss.includes(f.store))}
  // Apply store filter dropdown
  if(storeFilter!=='all'){files=files.filter(f=>f.store==='all'||f.store===storeFilter)}
  // Apply search
  if(search){files=files.filter(f=>f.name.toLowerCase().includes(search))}
  if(!files.length){grid.innerHTML='<div class="file-empty">No matching training files</div>';return}
  grid.innerHTML=files.map((f,i)=>{const url=f.url||TF_LINK;const canDel=(SESSION.role==='store'||SESSION.role==='trainer')&&f.addedBy;return `<a href="${url}" target="_blank" rel="noopener" class="file-card"><div class="fc-ico">${f.ico||'📄'}</div><div class="fc-name">${esc(f.name)}</div><div class="fc-store">${f.store==='all'?'Universal':esc(f.store)}</div>${canDel?`<button onclick="event.preventDefault();delTrainingFile(${DB.trainingFiles.indexOf(f)})" style="margin-top:6px;background:transparent;border:1px solid #333;color:#9CA3AF;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer">🗑 Remove</button>`:''}</a>`}).join('');
}

function addTrainingFile(){
  const name=prompt('File name:');if(!name)return;
  const url=prompt('File URL (or leave blank for SharePoint link):')||TF_LINK;
  const store=SESSION.role==='store'?SESSION.store:(prompt('Store name (or "all" for universal):','all')||'all');
  const ico=prompt('Icon emoji (e.g. 📄):','📄')||'📄';
  if(!DB.trainingFiles)DB.trainingFiles=[];
  DB.trainingFiles.push({name,store,ico,url,addedBy:SESSION.email,addedAt:new Date().toISOString()});
  saveDB();toast('✓ File added','ok');filterTrainingFiles();
}
function delTrainingFile(idx){
  if(!confirm('Remove this file?'))return;
  DB.trainingFiles.splice(idx,1);saveDB();toast('✓ Removed','ok');filterTrainingFiles();
}

let _quizEmp=null,_quizSt=null;
function openQuiz(empId){
  _quizEmp=empId;
  const stations=STATIONS.map(s=>{const t=DB.employees.find(e=>e.id===empId).training[s];const last=t?.lastQuiz;return{s,status:t?.status||'Not Started',score:last?.score,date:last?.date,passed:last?.score===100}});
  $('modalBody').innerHTML=`<h3>📝 Quiz · Select Station</h3><p class="sub">100% required to pass · submission date+time recorded</p><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">${stations.map(x=>`<div onclick="startQuiz('${x.s}')" style="cursor:pointer;padding:12px;background:#FAFBFC;border:1.5px solid var(--line);border-radius:10px" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--line)'"><div style="font-weight:800;color:var(--ink)">${badgeFor(x.s)} ${STATION_LBL[x.s]}</div><div style="font-size:10px;color:var(--ink3);margin-top:4px">${x.passed?`✓ Passed · ${x.date}`:x.status}</div></div>`).join('')}</div><div style="margin-top:14px;text-align:right"><button class="btn btn-ghost btn-sm" onclick="closeMd()">Close</button></div>`;
  $('modal').classList.add('show');
}
function startQuiz(st){
  _quizSt=st;
  if(!DB.questions||!DB.questions[st]||!DB.questions[st].length){toast('No questions for this station yet','err');return}
  const qs=DB.questions[st];
  $('modalBody').innerHTML=`<h3>${badgeFor(st)} ${STATION_LBL[st]} Quiz</h3><p class="sub">${qs.length} questions · ${qs.length*2} marks · 100% required</p>${qs.map((q,i)=>`<div style="padding:12px;background:#FAFBFC;border-radius:10px;margin-bottom:10px"><div style="font-weight:700;font-size:13px;margin-bottom:8px">Q${i+1}. ${esc(q.q)}</div>${q.options.map(o=>`<label style="display:flex;align-items:center;gap:8px;padding:6px;cursor:pointer;border-radius:6px"><input type="radio" name="q${i}" value="${esc(o)}" style="width:auto"><span style="font-size:12px">${esc(o)}</span></label>`).join('')}</div>`).join('')}<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="closeMd()">Cancel</button><button class="btn btn-primary btn-sm" onclick="submitQuiz()">Submit</button></div>`;
}
function submitQuiz(){
  const qs=DB.questions[_quizSt],e=DB.employees.find(x=>x.id===_quizEmp);
  let correct=0;
  qs.forEach((q,i)=>{const sel=document.querySelector(`input[name="q${i}"]:checked`);if(sel&&sel.value===q.a)correct++});
  const score=Math.round((correct/qs.length)*100);
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const timeStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  if(!e.training[_quizSt])e.training[_quizSt]={};
  e.training[_quizSt].lastQuiz={score,date:dateStr,time:timeStr,at:now.toISOString(),correct,total:qs.length};
  if(score===100){
    e.training[_quizSt].status='Completed';
    e.training[_quizSt].date=todayISO();
    logAct(`${e.name} passed ${STATION_LBL[_quizSt]} 100% (${dateStr} ${timeStr})`,e.store);
    toast(`✓ PASSED 100% · Badge earned!`,'ok');
  } else {
    if(e.training[_quizSt].status!=='Completed')e.training[_quizSt].status='In Progress';
    toast(`Scored ${score}% (${correct}/${qs.length}) · 100% required`,'err');
  }
  saveDB();closeMd();renderStaff();
}

let _editId=null;
function openEmpModal(id){_editId=id||null;const e=id?DB.employees.find(x=>x.id===id):{};const canEdit=SESSION.role==='store';const ro=canEdit?'':'readonly disabled';
  $('modalBody').innerHTML=`<h3>${id?'Edit':'Add'} Employee</h3><p class="sub">${canEdit?'All fields with * are required':'View only'}</p>
  <div class="fg2"><div class="field"><label>Name *</label><input id="ef_n" value="${esc(e.name||'')}" ${ro}></div><div class="field"><label>Employee ID</label><input id="ef_id" value="${esc(e.empId||'')}" ${ro}></div><div class="field"><label>Email *</label><input id="ef_e" value="${esc(e.email||'')}" ${ro}></div><div class="field"><label>Phone *</label><input id="ef_p" value="${esc(e.phone||'')}" ${ro}></div><div class="field"><label>Designation</label><input id="ef_d" value="${esc(e.desig||'Crew')}" ${ro}></div><div class="field"><label>DOJ</label><input type="date" id="ef_doj" value="${e.doj||todayISO()}" ${ro}></div><div class="field"><label>Induction Date</label><input type="date" id="ef_ind" value="${e.inductionDate||''}" ${ro}></div><div class="field"><label>Status</label><select id="ef_st" ${ro}><option ${e.status==='Active'?'selected':''}>Active</option><option ${e.status==='Notice Period'?'selected':''}>Notice Period</option><option ${e.status==='Left'?'selected':''}>Left</option></select></div></div>
  <div class="fg2" style="margin-top:8px"><label class="field"><input type="checkbox" id="ef_ist" ${e.ist?'checked':''} ${ro}> IST Certified</label><label class="field"><input type="checkbox" id="ef_fos" ${e.fostac?'checked':''} ${ro}> FOSTAC Certified</label><label class="field"><input type="checkbox" id="ef_nl" ${e.nextLeader?'checked':''} ${ro}> ★ Next Leader</label></div>
  <div class="field"><label>Remarks</label><textarea id="ef_rm" rows="2" ${ro}>${esc(e.remarks||'')}</textarea></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="closeMd()">Close</button>${canEdit?`<button class="btn btn-primary btn-sm" onclick="saveEmp()">💾 Save</button>${id?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="delEmp()">🗑 Delete</button>`:''}`:''}</div>`;
  $('modal').classList.add('show');
}
function closeMd(){$('modal').classList.remove('show')}
function saveEmp(){const n=$('ef_n').value.trim(),em=$('ef_e').value.trim(),ph=$('ef_p').value.trim();if(!n||!em||!ph){toast('Name, Email, Phone required','err');return}const data={name:n,empId:$('ef_id').value,email:em,phone:ph,desig:$('ef_d').value,doj:$('ef_doj').value,inductionDate:$('ef_ind').value,status:$('ef_st').value,ist:$('ef_ist').checked,fostac:$('ef_fos').checked,nextLeader:$('ef_nl').checked,remarks:$('ef_rm').value,store:SESSION.store};if(data.status==='Left'&&!data.exitDate)data.exitDate=todayISO();if(_editId){const i=DB.employees.findIndex(x=>x.id===_editId);DB.employees[i]={...DB.employees[i],...data};logAct(`${n} updated`,SESSION.store)}else{const tr={};STATIONS.forEach(s=>tr[s]={status:'Not Started',date:null,remarks:''});DB.employees.push({id:Date.now(),...data,training:tr});logAct(`${n} added to ${SESSION.store}`,SESSION.store)}saveDB();toast('✓ Saved','ok');closeMd();renderStaff()}
function delEmp(){if(!confirm('Delete this employee?'))return;const e=DB.employees.find(x=>x.id===_editId);DB.employees=DB.employees.filter(x=>x.id!==_editId);logAct(`${e.name} removed`,SESSION.store);saveDB();toast('✓ Deleted','ok');closeMd();renderStaff()}
function logAct(msg,scope){DB.activity.push({at:new Date().toISOString(),msg,scope:scope||'all'});if(DB.activity.length>500)DB.activity=DB.activity.slice(-500)}

function renderTrain(){
  if(SESSION.role==='ceo'){$('content').innerHTML='<div class="empty">Not available for CEO view</div>';return}
  const emps=scopeEmps().filter(e=>e.status==='Active').slice(0,60);
  const canEdit=SESSION.role==='store'||SESSION.role==='trainer';
  let html=`<div class="page-h"><h1>🎓 Training Tracker</h1><p>Update station status + conduct quiz · 100% required to pass · submission date recorded</p></div>`;
  html+=emps.map(e=>{
    const p=trainPct(e);
    const stations=STATIONS.map(s=>{
      const t=e.training[s]||{status:'Not Started'};
      const last=t.lastQuiz;
      const stCls=t.status==='Completed'?'done':t.status==='In Progress'?'prog':'';
      const stColor=t.status==='Completed'?'#16A34A':t.status==='In Progress'?'#D97706':'#94A3B8';
      let inner='';
      if(canEdit){
        inner+=`<select onchange="updTrain(${e.id},'${s}',this.value)"><option ${t.status==='Not Started'?'selected':''}>Not Started</option><option ${t.status==='In Progress'?'selected':''}>In Progress</option><option ${t.status==='Completed'?'selected':''}>Completed</option></select>`;
      } else {
        inner+=`<div style="font-size:12px;font-weight:800;color:${stColor};margin-bottom:8px">${t.status}</div>`;
      }
      // Quiz info
      if(last){
        const passed=last.score===100;
        inner+=`<div class="tt-quiz-info"><div class="tt-quiz-row"><span class="tt-quiz-score" style="color:${passed?'#16A34A':'#DC2626'}">${last.score}/100</span><span class="tt-quiz-pass ${passed?'passed':'failed'}">${passed?'✓ Passed':'✗ Not Passed'}</span></div><div class="tt-quiz-date">📅 ${esc(last.date||'')}${last.time?' · '+esc(last.time):''}</div></div>`;
      }
      // Badge for completed station
      if(t.status==='Completed'){
        inner+=`<div class="tt-station-badge tt-badge-${s}">${badgeFor(s)} ${STATION_LBL[s]} ✓</div>`;
      }
      // Quiz button
      if(canEdit){
        inner+=`<button class="tt-quiz-btn" onclick="startQuizDirect(${e.id},'${s}')">📝 ${last?'Retake Quiz':'Take Quiz'}</button>`;
      }
      return `<div class="tt-station ${stCls}"><div class="tt-station-h"><div class="tt-station-ico">${badgeFor(s)}</div><div class="tt-station-name">${STATION_LBL[s]}</div></div>${inner}</div>`;
    }).join('');
    return `<div class="tt-emp-card"><div class="tt-emp-h"><div><div class="tt-emp-name">${esc(e.name)}</div><div class="tt-emp-meta">${esc(e.desig||'')} · ${esc(e.store)} · ${tenureLabel(e.doj)}</div></div><div class="tt-emp-pct"><div class="tt-emp-bar"><div class="tt-emp-bar-fill" style="width:${p}%"></div></div><div class="tt-emp-pctval">${p}%</div></div></div><div class="tt-stations">${stations}</div></div>`;
  }).join('');
  if(!emps.length)html+='<div class="empty">No active employees in your scope</div>';
  $('content').innerHTML=html;
}
function startQuizDirect(empId,st){_quizEmp=empId;startQuiz(st)}
function updTrain(id,st,val){const e=DB.employees.find(x=>x.id===id);if(!e)return;if(!e.training[st])e.training[st]={};e.training[st].status=val;e.training[st].date=val==='Completed'?todayISO():null;if(val==='Completed')logAct(`${e.name} completed ${STATION_LBL[st]}`,e.store);saveDB();toast('✓ Updated','ok');renderTrain()}

function renderReports(){
  const stores=scopeStores();
  let html=`<div class="page-h"><h1>📦 Reports</h1><p>Custom date range · CSV download · ${SESSION.role==='store'?'own store only':SESSION.role==='am'?'your area':'pan-India'}</p></div>`;
  html+=`<div class="card"><div class="card-h"><div class="card-t">Filters</div></div>
    <div class="fg2">
      <div class="field"><label>Report Type</label><select id="rp_t"><option value="staff">Staff List</option><option value="training">Training Completion</option><option value="pending">Pending Training</option><option value="newjoiner">New Joiner</option><option value="attrition">Attrition</option><option value="ist">IST / Next Leader</option></select></div>
      ${SESSION.role!=='store'?`<div class="field"><label>Store</label><select id="rp_s"><option value="">All Stores</option>${stores.map(s=>`<option>${esc(s.n)}</option>`).join('')}</select></div>`:''}
      <div class="field"><label>From Date</label><input type="date" id="rp_f"></div>
      <div class="field"><label>To Date</label><input type="date" id="rp_to" value="${todayISO()}"></div>
      <div class="field"><label>Status</label><select id="rp_st"><option value="">All</option><option>Active</option><option>Notice Period</option><option>Left</option></select></div>
    </div>
    <div style="margin-top:12px"><button class="btn btn-primary" onclick="runRpt()">⬇ Generate & Download CSV</button></div>
  </div><div id="rpPrev"></div>`;
  $('content').innerHTML=html;
}
function runRpt(){
  const t=$('rp_t').value,store=$('rp_s')?.value||'',from=$('rp_f').value,to=$('rp_to').value,st=$('rp_st').value;
  let emps=scopeEmps();if(SESSION.role==='store')emps=emps.filter(e=>e.store===SESSION.store);if(store)emps=emps.filter(e=>e.store===store);if(st)emps=emps.filter(e=>e.status===st);
  const inR=d=>!d||((!from||d>=from)&&(!to||d<=to));
  let rows=[];
  if(t==='staff'){rows=[['ID','Name','Desig','Store','Email','Phone','DOJ','Tenure','Status','IST','FOSTAC','NL','Train%']];emps.forEach(e=>rows.push([e.empId,e.name,e.desig,e.store,e.email,e.phone,e.doj,tenureLabel(e.doj),e.status,e.ist?'Y':'N',e.fostac?'Y':'N',e.nextLeader?'Y':'N',trainPct(e)+'%']))}
  else if(t==='training'){rows=[['Name','Store','HOT','COLD','FOOD','BAKING','CLEANING','POS','%']];emps.forEach(e=>rows.push([e.name,e.store,...STATIONS.map(s=>e.training[s]?.status||'NS'),trainPct(e)+'%']))}
  else if(t==='pending'){emps=emps.filter(e=>e.status==='Active'&&!isFullyTrained(e));rows=[['Name','Store','Pending Stations','%']];emps.forEach(e=>rows.push([e.name,e.store,STATIONS.filter(s=>e.training[s]?.status!=='Completed').join(';'),trainPct(e)+'%']))}
  else if(t==='newjoiner'){emps=emps.filter(e=>inR(e.doj)&&isNewJoiner(e));rows=[['Name','Store','DOJ','Tenure','Email','Phone']];emps.forEach(e=>rows.push([e.name,e.store,e.doj,tenureLabel(e.doj),e.email,e.phone]))}
  else if(t==='attrition'){emps=emps.filter(e=>e.status==='Left'&&inR(e.exitDate));rows=[['Name','Store','DOJ','Exit','Tenure at Exit','Reason']];emps.forEach(e=>rows.push([e.name,e.store,e.doj,e.exitDate||'—',tenureLabel(e.doj),e.remarks||'—']))}
  else if(t==='ist'){emps=emps.filter(e=>e.ist||e.nextLeader);rows=[['Name','Store','IST','NL','Notes']];emps.forEach(e=>rows.push([e.name,e.store,e.ist?'Y':'N',e.nextLeader?'Y':'N',e.leaderNotes||'']))}
  if(rows.length<=1){toast('No data','err');return}
  // Preview + download
  const hd=rows[0],bd=rows.slice(1);
  $('rpPrev').innerHTML=`<div class="card"><div class="card-h"><div><div class="card-t">📋 Preview · ${bd.length} rows</div></div></div><div class="tbl-wrap" style="max-height:400px"><table><thead><tr>${hd.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${bd.slice(0,100).map(r=>`<tr>${r.map(c=>`<td>${esc(String(c||''))}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
  const csv=rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`th_${t}_${todayISO()}.csv`;a.click();
  toast('✓ Downloaded','ok')
}

function renderQuestions(){
  if(SESSION.role!=='trainer'){$('content').innerHTML='<div class="empty">Trainer access only · Only Vrunda (West Training Centre) can manage questions</div>';return;}
  if(!DB.questions){DB.questions={};STATIONS.forEach(s=>{DB.questions[s]=[];for(let i=1;i<=10;i++)DB.questions[s].push({q:`Sample question ${i} for ${STATION_LBL[s]}`,a:'Correct answer',options:['Correct answer','Option B','Option C','Option D']})});saveDB()}
  let html=`<div class="page-h"><h1>📚 Question Bank</h1><p>Trainer only · 6 stations × 10 questions × 2 marks = 20 marks per station</p></div>`;
  html+=STATIONS.map(s=>{const qs=DB.questions[s]||[];return`<div class="card"><div class="card-h"><div><div class="card-t">${STATION_LBL[s]} · ${qs.length} questions</div><div class="card-st">${qs.length*2} marks total · 100% required to pass</div></div><button class="btn btn-primary btn-sm" onclick="editQ('${s}',-1)">+ Add Question</button></div>${qs.map((q,i)=>`<div style="padding:10px 12px;background:#FAFBFC;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div style="flex:1"><div style="font-weight:700;font-size:12px;margin-bottom:3px">Q${i+1}. ${esc(q.q)}</div><div style="font-size:11px;color:var(--ink3)">Answer: <b style="color:var(--green)">${esc(q.a)}</b></div></div><div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="editQ('${s}',${i})">✏️</button><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="delQ('${s}',${i})">🗑</button></div></div>`).join('')}</div>`}).join('');
  $('content').innerHTML=html;
}
function editQ(st,idx){const q=idx>=0?DB.questions[st][idx]:{q:'',a:'',options:['','','','']};$('modalBody').innerHTML=`<h3>${idx>=0?'Edit':'Add'} Question · ${STATION_LBL[st]}</h3><div class="field"><label>Question</label><textarea id="qf_q" rows="2">${esc(q.q)}</textarea></div>${[0,1,2,3].map(i=>`<div class="field"><label>Option ${String.fromCharCode(65+i)}</label><input id="qf_o${i}" value="${esc(q.options[i]||'')}"></div>`).join('')}<div class="field"><label>Correct Answer (must match one option exactly)</label><input id="qf_a" value="${esc(q.a)}"></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="closeMd()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveQ('${st}',${idx})">💾 Save</button></div>`;$('modal').classList.add('show')}
function saveQ(st,idx){const q=$('qf_q').value.trim(),a=$('qf_a').value.trim(),opts=[0,1,2,3].map(i=>$('qf_o'+i).value.trim()).filter(Boolean);if(!q||!a||opts.length<2){toast('Question, answer, at least 2 options required','err');return}if(!opts.includes(a)){toast('Correct answer must match one of the options','err');return}const data={q,a,options:opts};if(idx<0)DB.questions[st].push(data);else DB.questions[st][idx]=data;saveDB();toast('✓ Saved','ok');closeMd();renderQuestions()}
function delQ(st,idx){if(!confirm('Delete this question?'))return;DB.questions[st].splice(idx,1);saveDB();toast('✓ Deleted','ok');renderQuestions()}

function renderRoster(){if(SESSION.role==='ceo'){$('content').innerHTML='<div class="empty">Not available for CEO view</div>';return}let h='<div class="page-h"><h1>📅 '+(SESSION.role==='store'?'Weekly Roster Upload':'Store Rosters')+'</h1><p>'+(SESSION.role==='store'?'Upload PDF or image rosters for your store':'View weekly rosters from stores in your scope')+'</p></div>';h+=renderRosterSection();$('content').innerHTML=h}

function renderFeed(){const acts=DB.activity.filter(a=>{if(SESSION.role==='admin')return true;if(SESSION.role==='am')return a.scope===SESSION.amKey||a.scope==='all'||scopeStores().some(s=>s.n===a.scope);return a.scope===SESSION.store||a.scope==='all'}).slice().reverse();$('content').innerHTML=`<div class="page-h"><h1>🔔 Activity Feed</h1><p>${acts.length} events</p></div><div class="card">${acts.length?acts.map(a=>`<div style="padding:11px 0;border-bottom:1px solid #F1F5F9"><div style="font-weight:600">${esc(a.msg)}</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">${new Date(a.at).toLocaleString('en-IN')} · ${esc(a.scope)}</div></div>`).join(''):'<div class="empty">No activity</div>'}</div>`}

function renderCpw(){$('content').innerHTML=`<div class="page-h"><h1>🔑 Change Password</h1></div><div class="card" style="max-width:480px"><div class="field"><label>Authorization Code</label><input id="cp2_c" placeholder="TH2026"></div><div class="field"><label>New Password</label><input type="password" id="cp2_n"></div><button class="btn btn-primary" onclick="cpwApp()">Update</button></div>`}
function cpwApp(){if($('cp2_c').value!=='TH2026'){toast('Invalid code','err');return}if($('cp2_n').value.length<6){toast('Min 6 chars','err');return}DB.passwords[SESSION.email]=$('cp2_n').value;saveDB();toast('✓ Password updated','ok')}

window.addEventListener('DOMContentLoaded',()=>{loadDB();const s=sessionStorage.getItem('th_sess');if(s){SESSION=JSON.parse(s);enterApp()}});
