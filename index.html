<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tim Hortons · OpsAI Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F5F0;--card:#FFF;--ink:#0A0A0A;--ink2:#4A4A4A;--ink3:#7A7A7A;--line:#E8E8E4;--red:#C8102E;--red2:#9A0B22;--green:#1B7A3D;--amber:#B45309;--shadow:0 1px 3px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.04)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font:inherit;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;width:100%}
input:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1)}
.hide{display:none!important}

/* SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--ink);color:#E0E0E0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.3s}
.sb-brand{padding:20px 18px;border-bottom:1px solid #222}
.sb-logo{font-weight:900;font-size:17px;color:#fff;letter-spacing:-.02em}
.sb-logo span{color:var(--red)}
.sb-tag{font-size:10px;color:#888;margin-top:2px}
.sb-nav{flex:1;padding:10px 0}
.sb-link{display:flex;align-items:center;gap:10px;padding:11px 18px;color:#ccc;font-weight:600;font-size:13px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.sb-link:hover{background:#1a1a1a;color:#fff}
.sb-link.on{background:linear-gradient(90deg,rgba(200,16,46,.15),transparent);color:#fff;border-left-color:var(--red)}
.sb-link i{font-size:15px;width:20px;text-align:center}

.main{flex:1;margin-left:220px;min-width:0}
.topbar{background:#fff;border-bottom:2px solid var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:17px;font-weight:800}
.menu-btn{display:none;background:var(--ink);color:#fff;padding:6px 10px;border-radius:6px;font-size:16px}
.content{padding:24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-t{font-size:15px;font-weight:800;margin-bottom:4px}
.card-st{font-size:11px;color:var(--ink3);font-weight:600}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:.2s}
.kpi:hover{transform:translateY(-2px);border-color:var(--red)}
.kpi-lbl{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.kpi-sub{font-size:10px;color:var(--ink3);font-weight:600;margin-top:4px}

/* TRAINING FOLDER */
.tf-card{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:16px;border-left:4px solid var(--red);border-radius:12px;cursor:pointer;margin-bottom:20px;box-shadow:var(--shadow);transition:.2s}
.tf-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,16,46,.12)}
.tf-title{font-weight:800;font-size:14px;color:var(--ink)}
.tf-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.tf-btn{color:var(--red);font-weight:800;font-size:13px;white-space:nowrap}

/* TRAINING TRACKER */
.tt-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px;transition:.2s}
.tt-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08)}
.tt-h{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.tt-name{font-size:16px;font-weight:800}
.tt-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px}
.tt-pct{font-size:24px;font-weight:900;letter-spacing:-.02em}
.tt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tt-box{border-radius:10px;padding:12px;font-size:12px;border:1.5px solid var(--line);transition:.2s;display:flex;flex-direction:column;gap:4px;min-height:120px}
.tt-box:hover{transform:translateY(-2px)}
.tt-box.done{background:#F0FDF4;border-color:#22C55E}
.tt-box.pending{background:#FAFAFA;border-color:#DDD}
.tt-box-h{display:flex;align-items:center;gap:6px;font-weight:800;font-size:12px}
.tt-box-ico{font-size:18px}
.tt-status{font-weight:700;font-size:11px;margin-top:auto}
.tt-date{font-size:10px;color:var(--ink3)}
.quiz-btn{width:100%;padding:7px;border-radius:7px;background:var(--red);color:#fff;font-weight:700;font-size:11px;margin-top:auto;border:none;cursor:pointer;transition:.15s}
.quiz-btn:hover{background:var(--red2)}

/* QUIZ MODAL */
.qz-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.qz-md{background:#fff;border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;border-top:4px solid var(--red)}
.qz-md h2{font-size:18px;font-weight:800;margin-bottom:2px}
.qz-md .qz-sub{font-size:11px;color:var(--ink3);margin-bottom:16px}
.qz-q{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.qz-q .qt{font-size:13px;font-weight:700;margin-bottom:8px}
.qz-q .qn{color:var(--red);font-weight:800;margin-right:4px}
.qz-q label{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:.1s}
.qz-q label:hover{background:#fff}
.qz-q input[type=radio]{accent-color:var(--red)}
.qz-submit{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px}
.qz-cancel{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--line);border-radius:10px;font-size:12px;cursor:pointer;margin-top:6px}

/* STAFF */
.staff-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow);transition:.2s}
.staff-card:hover{transform:translateY(-2px)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.badge-g{background:#DCFCE7;color:#166534}
.badge-r{background:#FEE2E2;color:#991B1B}
.badge-b{background:#DBEAFE;color:#1E40AF}
.badge-y{background:#FEF3C7;color:#92400E}

/* ROSTER */
.roster-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.roster-card .r-info{font-size:12px;font-weight:600}
.roster-card .r-date{font-size:10px;color:var(--ink3)}
.r-view{padding:6px 14px;background:var(--red);color:#fff;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;border:none;cursor:pointer}

/* RESPONSIVE */
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-btn{display:inline-flex}.kpi-grid{grid-template-columns:repeat(2,1fr)}.tt-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}.tt-grid{grid-template-columns:1fr}}
.empty{padding:30px;text-align:center;color:var(--ink3);background:var(--bg);border:1px dashed var(--line);border-radius:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:9999;opacity:0;transform:translateY(20px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
</style>
</head>
<body>

<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-logo">OpsAI <span>Hub</span></div><div class="sb-tag">Tim Hortons India</div></div>
  <nav class="sb-nav">
    <a class="sb-link on" data-v="dash" onclick="go('dash')"><i>📊</i>Dashboard</a>
    <a class="sb-link" data-v="staff" onclick="go('staff')"><i>👥</i>Staff Data</a>
    <a class="sb-link" data-v="train" onclick="go('train')"><i>🎓</i>Training Tracker</a>
    <a class="sb-link" data-v="roster" onclick="go('roster')"><i>📅</i>Weekly Roster</a>
  </nav>
</aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px"><button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><h2 id="pageTitle">Dashboard</h2></div>
    <div style="font-size:11px;color:var(--ink3);font-weight:600" id="dateNow"></div>
  </div>
  <div class="content" id="content"></div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
const SK='th_dash_v2';
const STATIONS=['HOT','COLD','FOOD','BAKING','CLEANING','POS'];
const ST_ICO={HOT:'🔥',COLD:'❄️',FOOD:'🍔',BAKING:'🧁',CLEANING:'🧹',POS:'💻'};
const TF_LINK='https://timhortonsindia.sharepoint.com/sites/TrainingFolder/Shared%20Documents/Forms/AllItems.aspx?viewid=f3cb11bd-038f-47be-a753-d95269df0bb9';

function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(m,k){const t=$('toast');t.textContent=m;t.className='toast show '+(k||'');setTimeout(()=>t.className='toast',2500)}
function todayStr(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear()}
function daysSince(doj){if(!doj)return 0;const p=doj.split('-');let d;if(p[0].length===4)d=new Date(doj);else d=new Date(p[2],p[1]-1,p[0]);return Math.max(0,Math.floor((new Date()-d)/86400000))}

/* DATA */
let DB;
function loadDB(){try{const r=localStorage.getItem(SK);if(r)DB=JSON.parse(r)}catch(e){}if(!DB||!DB.employees||!DB.employees.length)seedDB()}
function saveDB(){localStorage.setItem(SK,JSON.stringify(DB))}

function seedDB(){
DB={employees:[
  {id:1,firstName:'Rahul',lastName:'Sharma',desig:'Shift Manager',store:'T1D',doj:'15-01-2023',status:'Active',ist:true,fostac:true,nextLeader:true,
   training:{HOT:{marks:20,date:'10-03-2025'},COLD:{marks:20,date:'11-03-2025'},FOOD:{marks:20,date:'12-03-2025'},BAKING:{marks:20,date:'13-03-2025'},CLEANING:{marks:20,date:'14-03-2025'},POS:{marks:20,date:'15-03-2025'}}},
  {id:2,firstName:'Priya',lastName:'Singh',desig:'Crew',store:'T1D',doj:'05-06-2024',status:'Active',ist:false,fostac:true,nextLeader:false,
   training:{HOT:{marks:20,date:'01-04-2025'},COLD:null,FOOD:{marks:20,date:'02-04-2025'},BAKING:null,CLEANING:{marks:20,date:'03-04-2025'},POS:null}},
  {id:3,firstName:'Amit',lastName:'Kumar',desig:'Crew',store:'T1D',doj:'20-02-2025',status:'Active',ist:false,fostac:false,nextLeader:false,
   training:{HOT:null,COLD:null,FOOD:null,BAKING:null,CLEANING:null,POS:null}},
  {id:4,firstName:'Neha',lastName:'Patel',desig:'Shift Manager',store:'T1D',doj:'10-08-2023',status:'Notice Period',ist:true,fostac:true,nextLeader:false,
   training:{HOT:{marks:20,date:'05-01-2025'},COLD:{marks:20,date:'06-01-2025'},FOOD:{marks:20,date:'07-01-2025'},BAKING:{marks:20,date:'08-01-2025'},CLEANING:{marks:20,date:'09-01-2025'},POS:{marks:20,date:'10-01-2025'}}}
],
rosters:[],
questions:{}
};
STATIONS.forEach(s=>{DB.questions[s]=buildQuestions(s)});
saveDB();
}

function buildQuestions(station){
const bases={
HOT:['Ideal milk steaming temperature?','Espresso shot pull time?','What causes channeling?','Brew water temperature for drip?','How should portafilter be stored?','What is crema?','Coffee bean storage method?','How long is brewed coffee fresh?','Correct dose for double espresso?','Over-extraction tastes like?','Espresso machine cleaning frequency?','What is a ristretto?','Descaling frequency?','Water TDS for brewing?','Under-extraction tastes like?','Coffee to water ratio for drip?','Safety gear for hot beverages?','French press brew time?','Grinder burr replacement frequency?','Grind size for espresso?'],
COLD:['Cold drink serving temperature?','Cold brew steep time?','Cold brew concentrate ratio?','How long can iced coffee sit out?','Smoothie ingredient storage?','First step in layered drink?','Blender blade check frequency?','Shelf life of cold brew?','Syrup storage method?','Best milk for cold frothing?','How to prevent watery iced coffee?','How to clean blender?','Cause of drink separation?','Fruit puree storage?','What is flash brewing?','PPE for handling ice?','Ice machine cleaning frequency?','What is nitrogen cold brew?','Large iced drink cup size?','How to check drink consistency?'],
FOOD:['Danger zone temperature range?','Max time in danger zone?','What is FIFO?','Where to store raw meat?','Min internal temp for chicken?','Hand washing frequency?','Green cutting board is for?','What is cross-contamination?','How to cool leftovers?','Correct handwashing duration?','When to change gloves?','What is the 3-sink method?','What documents food safety?','What is a critical control point?','How to handle food recall?','How to sanitize surfaces?','What is a food allergen?','Chemical storage rule?','How to check oil temperature?','What is the 2-hour rule?'],
BAKING:['Ideal proofing temperature?','Standard dough proof time?','What does gluten provide?','Role of yeast in baking?','Flour storage method?','What causes dense bread?','Cookie baking temperature?','How to test if bread is done?','What is creaming method?','What is bench rest?','Baking soda needs what to activate?','Pastry storage method?','What is lamination?','Oven calibration frequency?','What causes cookies to spread?','What is par-baking?','How to measure flour correctly?','Parchment paper purpose?','How to temper eggs?','How to prevent overbaking?'],
CLEANING:['Floor mopping frequency?','Sanitizer concentration?','Correct cleaning order?','Grease trap cleaning frequency?','Required PPE for cleaning?','How to store mops?','What is a cleaning schedule?','Waste disposal method?','Deep clean fryer frequency?','Sanitizer contact time?','Restroom check frequency?','How to handle chemical spills?','What is an MSDS?','Chemical labeling rule?','What is color-coded cleaning?','AC vent cleaning frequency?','How to sanitize cutting boards?','Pest control frequency?','Glass cleaning method?','How to clean coffee machine?'],
POS:['What does POS stand for?','How to process cash payment?','Void transaction requires?','What is a SKU?','How to apply discount?','POS freezes — what to do?','Card payment process?','End-of-day reconciliation?','Refund process requires?','What is a modifier in POS?','How to split a bill?','What is a Z-report?','How to add new menu item?','Price discrepancy action?','POS update frequency?','What is combo meal setup?','Network failure action?','What is KOT?','New staff POS training?','POS security measure?']
};
const answers={
HOT:['60°C','25 seconds','Uneven tamping','96°C','In group head','Golden foam on espresso','Airtight container','30 minutes','18g','Bitter','Daily','Short pull espresso','Monthly','150 PPM','Sour','1:15','Heat-resistant gloves','4 minutes','Annually','Fine'],
COLD:['4°C','12-24 hours','1:5','1 hour','Frozen','Ice','Weekly','2 weeks','Room temperature','Oat milk','Coffee ice cubes','Blend with soap and water','Temperature difference','Refrigerated','Hot brew over ice','Scoop and gloves','Weekly','Cold brew with nitrogen','24 oz','Visual and taste check'],
FOOD:['4-60°C','2 hours','First In First Out','Bottom shelf','74°C','Every 30 minutes','Vegetables','Transfer of bacteria','Within 2 hours','20 seconds','Between tasks','Wash rinse sanitize','HACCP log','Step where hazard prevented','Remove and isolate','Approved sanitizer','Substance causing allergic reaction','Away from food','Thermometer','Discard food left out over 2 hours'],
BAKING:['27°C','1-2 hours','Structure and elasticity','Leavening agent','Cool dry place sealed','Under-proofing','180°C','Internal temp 95°C','Beat butter and sugar','Resting dough between shaping','Acid','Airtight at room temp','Folding butter into dough layers','Monthly','Too much butter or warm dough','Partially baking before finishing','Spoon and level','Non-stick baking surface','Add warm liquid slowly','Timer and visual check'],
CLEANING:['Every shift','200 PPM','Scrape wash rinse sanitize','Weekly','Gloves and apron','Hanging to dry','Documented task frequency list','Segregated bins','Weekly','30 seconds','Every hour','Contain and clean with MSDS guidance','Material Safety Data Sheet','Original label intact','Different cloths per area','Monthly','Sanitizer soak 1 minute','Monthly inspection','Glass cleaner and lint-free cloth','Backflush with cleaner'],
POS:['Point of Sale','Enter amount tender cash give change','Manager approval','Stock Keeping Unit','Select discount key enter code','Restart terminal','Insert or tap card wait for approval','Match POS totals to cash drawer','Manager approval original receipt','Add-on to menu item','Use split function select items','End of day sales summary','Manager menu configuration','Verify and escalate to manager','When updates released','Grouped items at set price','Switch to offline mode','Kitchen Order Ticket','Shadow shifts and practice mode','Unique login per employee']
};
const wrongs=['Option A','Option B','Option C'];
return bases[station].map((q,i)=>({question:q,answer:answers[station][i],options:shuffle([answers[station][i],...wrongs.map((w,j)=>w+' '+(i*3+j+1))])}));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

/* HELPERS */
function stationDone(t,s){return t&&t[s]!==null&&t[s]!==undefined&&t[s].marks===20}
function completedCount(e){if(!e.training)return 0;return STATIONS.filter(s=>stationDone(e.training,s)).length}
function trainPct(e){return Math.round((completedCount(e)/6)*100)}
function activeEmps(){return DB.employees.filter(e=>e.status==='Active')}
function fullName(e){return(e.firstName||'')+' '+(e.lastName||'')}

/* NAVIGATION */
function go(view){
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.toggle('on',l.dataset.v===view));
  $('pageTitle').textContent={dash:'Dashboard',staff:'Staff Data',train:'Training Tracker',roster:'Weekly Roster'}[view];
  if(innerWidth<900)$('sidebar').classList.remove('open');
  ({dash:renderDash,staff:renderStaff,train:renderTrain,roster:renderRoster}[view])();
}

/* DASHBOARD */
function renderDash(){
  const emps=activeEmps();
  const total=emps.length;
  const fullyTrained=emps.filter(e=>completedCount(e)===6).length;
  const fostac=emps.filter(e=>e.fostac).length;
  const notice=DB.employees.filter(e=>e.status==='Notice Period').length;
  const ist=emps.filter(e=>e.ist).length;
  const avgPct=total?Math.round(emps.reduce((s,e)=>s+trainPct(e),0)/total):0;
  $('content').innerHTML=`
    <div class="tf-card" onclick="window.open('${TF_LINK}','_blank')">
      <div><div class="tf-title">📂 Training Access</div><div class="tf-sub">SOPs &amp; training documents</div></div>
      <div class="tf-btn">Open Here →</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Total Staff</div><div class="kpi-val">${total}</div><div class="kpi-sub">active employees</div></div>
      <div class="kpi"><div class="kpi-lbl">Training %</div><div class="kpi-val">${avgPct}%</div><div class="kpi-sub">avg completion</div></div>
      <div class="kpi"><div class="kpi-lbl">Fully Trained</div><div class="kpi-val">${fullyTrained}</div><div class="kpi-sub">6/6 stations</div></div>
      <div class="kpi"><div class="kpi-lbl">FOSTAC</div><div class="kpi-val">${fostac}</div><div class="kpi-sub">certified</div></div>
      <div class="kpi"><div class="kpi-lbl">IST Count</div><div class="kpi-val">${ist}</div><div class="kpi-sub">trainers</div></div>
      <div class="kpi"><div class="kpi-lbl">On Notice</div><div class="kpi-val">${notice}</div><div class="kpi-sub">pending exit</div></div>
      <div class="kpi"><div class="kpi-lbl">Staff Required</div><div class="kpi-val">14</div><div class="kpi-sub">target headcount</div></div>
      <div class="kpi"><div class="kpi-lbl">Manpower Gap</div><div class="kpi-val">${Math.max(0,14-total)}</div><div class="kpi-sub">${total>=14?'on target':'need '+(14-total)+' more'}</div></div>
    </div>`;
}

/* STAFF DATA */
function renderStaff(){
  const emps=DB.employees;
  let html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h3>'+emps.length+' Employees</h3><button onclick="addEmpModal()" style="padding:8px 16px;background:var(--red);color:#fff;border-radius:8px;font-weight:700;font-size:12px">+ Add Employee</button></div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">';
  emps.forEach(e=>{
    const pct=trainPct(e);const days=daysSince(e.doj);const c=completedCount(e);
    const badges=[];
    if(e.ist)badges.push('<span class="badge badge-b">IST</span>');
    if(e.fostac)badges.push('<span class="badge badge-g">FOSTAC</span>');
    if(e.nextLeader)badges.push('<span class="badge badge-y">★ Next Leader</span>');
    if(e.status==='Notice Period')badges.push('<span class="badge badge-r">Notice</span>');
    html+=`<div class="staff-card">
      <div style="font-weight:800;font-size:14px">${esc(fullName(e))}</div>
      <div style="font-size:11px;color:var(--ink3);margin:4px 0">${esc(e.desig)} · ${days} days in store</div>
      <div style="font-size:11px;color:${pct===100?'var(--green)':'var(--red)'};font-weight:700">Training: ${pct}% (${c}/6)</div>
      ${badges.length?'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">'+badges.join('')+'</div>':''}
    </div>`;
  });
  html+='</div>';
  $('content').innerHTML=html;
}

/* ADD EMPLOYEE MODAL */
function addEmpModal(){
  const ov=document.createElement('div');ov.className='qz-ov';
  ov.innerHTML=`<div class="qz-md"><h2>Add Employee</h2><div class="qz-sub">All fields with * are required</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label style="font-size:11px;font-weight:700">First Name *</label><input id="af_fn"></div>
      <div><label style="font-size:11px;font-weight:700">Last Name *</label><input id="af_ln"></div>
      <div><label style="font-size:11px;font-weight:700">Designation</label><input id="af_d" value="Crew"></div>
      <div><label style="font-size:11px;font-weight:700">DOJ (DD-MM-YYYY)</label><input id="af_doj" value="${todayStr()}"></div>
    </div>
    <button class="qz-submit" onclick="saveNewEmp()">Save Employee</button>
    <button class="qz-cancel" onclick="this.closest('.qz-ov').remove()">Cancel</button>
  </div>`;
  document.body.appendChild(ov);
}
function saveNewEmp(){
  const fn=$('af_fn').value.trim(),ln=$('af_ln').value.trim();
  if(!fn){toast('First Name is required','err');return}
  if(!ln){toast('Last Name is required','err');return}
  const tr={};STATIONS.forEach(s=>tr[s]=null);
  DB.employees.push({id:Date.now(),firstName:fn,lastName:ln,desig:$('af_d').value||'Crew',store:'T1D',doj:$('af_doj').value||todayStr(),status:'Active',ist:false,fostac:false,nextLeader:false,training:tr});
  saveDB();document.querySelector('.qz-ov').remove();toast('✓ Employee added','ok');renderStaff();
}

/* TRAINING TRACKER */
function renderTrain(){
  const emps=DB.employees.filter(e=>e.status==='Active');
  let html='';
  emps.forEach(e=>{
    const c=completedCount(e);const pct=trainPct(e);const days=daysSince(e.doj);
    html+=`<div class="tt-card">
      <div class="tt-h">
        <div><div class="tt-name">${esc(fullName(e))}</div><div class="tt-meta">${esc(e.desig)} · ${days} days in store</div></div>
        <div style="text-align:right"><div class="tt-pct" style="color:${pct===100?'var(--green)':'var(--red)'}">${pct}%</div><div style="font-size:10px;color:var(--ink3)">${c}/6 stations</div></div>
      </div>
      <div class="tt-grid">${STATIONS.map(s=>{
        const done=stationDone(e.training,s);
        const data=e.training?e.training[s]:null;
        if(done){
          return `<div class="tt-box done">
            <div class="tt-box-h"><span class="tt-box-ico">${ST_ICO[s]}</span>${s}</div>
            <div style="font-weight:700;color:var(--green)">✔ Completed</div>
            <div style="font-size:11px">Marks: 20/20</div>
            <div class="tt-date">📅 ${esc(data.date)}</div>
          </div>`;
        }else{
          return `<div class="tt-box pending">
            <div class="tt-box-h"><span class="tt-box-ico">${ST_ICO[s]}</span>${s}</div>
            <div style="font-weight:700;color:var(--ink3)">❌ Pending</div>
            <button class="quiz-btn" onclick="openQuiz(${e.id},'${s}')">Take Quiz</button>
          </div>`;
        }
      }).join('')}</div>
    </div>`;
  });
  if(!emps.length)html='<div class="empty">No active employees</div>';
  $('content').innerHTML=html;
}

/* QUIZ */
function openQuiz(empId,station){
  const e=DB.employees.find(x=>x.id===empId);if(!e)return;
  if(stationDone(e.training,station)){toast('Already completed!','ok');return}
  const qs=DB.questions[station];if(!qs||!qs.length){toast('No questions configured','err');return}
  const ov=document.createElement('div');ov.className='qz-ov';ov.id='quizOverlay';
  ov.innerHTML=`<div class="qz-md"><h2>${ST_ICO[station]} ${station} Station Quiz</h2><div class="qz-sub">20 MCQ Questions · Score 100% (20/20) to pass · Answers will NOT be shown</div>
    ${qs.map((q,i)=>`<div class="qz-q"><div class="qt"><span class="qn">Q${i+1}.</span>${esc(q.question)}</div>${q.options.map(o=>`<label><input type="radio" name="qq${i}" value="${esc(o)}">${esc(o)}</label>`).join('')}</div>`).join('')}
    <button class="qz-submit" onclick="submitQuiz(${empId},'${station}')">Submit Quiz</button>
    <button class="qz-cancel" onclick="this.closest('.qz-ov').remove()">Cancel</button>
  </div>`;
  document.body.appendChild(ov);
}

function submitQuiz(empId,station){
  const e=DB.employees.find(x=>x.id===empId);if(!e)return;
  if(stationDone(e.training,station)){toast('Already completed!','ok');document.querySelector('.qz-ov').remove();return}
  const qs=DB.questions[station];
  let answered=0,correct=0;
  qs.forEach((q,i)=>{const sel=document.querySelector('input[name="qq'+i+'"]:checked');if(sel){answered++;if(sel.value===q.answer)correct++}});
  if(answered<qs.length){toast('Answer all '+qs.length+' questions','err');return}
  if(correct===qs.length){
    e.training[station]={marks:20,date:todayStr()};
    saveDB();
    document.querySelector('.qz-ov').remove();
    toast('✅ PASSED! Station certified!','ok');
  }else{
    toast('❌ Score: '+correct+'/'+qs.length+' — You must score 100% to pass','err');
  }
  renderTrain();
}

/* ROSTER */
function renderRoster(){
  let html='<div style="margin-bottom:14px"><input type="file" id="rosterInput" accept="application/pdf,image/*" style="display:none" onchange="uploadRoster(event)"><button onclick="$(\'rosterInput\').click()" style="padding:8px 16px;background:var(--red);color:#fff;border-radius:8px;font-weight:700;font-size:12px">📤 Upload Roster</button></div>';
  if(!DB.rosters.length){html+='<div class="empty">No rosters uploaded yet</div>';}
  else{DB.rosters.slice().reverse().forEach(r=>{
    const ico=r.type.includes('pdf')?'📄':'🖼️';
    html+=`<div class="roster-card"><div><div class="r-info">${ico} ${esc(r.name)}</div><div class="r-date">📅 ${esc(r.date)}</div></div><button class="r-view" onclick="window.open('${r.data}','_blank')">View</button></div>`;
  })}
  $('content').innerHTML=html;
}
function uploadRoster(ev){
  const f=ev.target.files[0];if(!f)return;
  if(f.size>5*1024*1024){toast('Max 5MB','err');return}
  const reader=new FileReader();
  reader.onload=e=>{
    DB.rosters.push({name:f.name,type:f.type,date:todayStr(),data:e.target.result});
    saveDB();toast('✓ Uploaded','ok');renderRoster();
  };
  reader.readAsDataURL(f);
  ev.target.value='';
}

/* INIT */
$('dateNow').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
loadDB();
renderDash();
</script>
